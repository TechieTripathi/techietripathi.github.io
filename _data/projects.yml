projects:

  - title: "LLM Prompt Sensitivity & Narrative Reasoning Analysis"
    focus: "LLM reasoning robustness and evaluation"

    description: "Analyzing the stability of LLM reasoning under controlled prompt variations"

    problem: "Large language models often produce inconsistent outputs under minor prompt changes, raising concerns about the reliability of their reasoning processes"

    approach: "As part of SemEval 2026 Task 4, designed structured prompt families (few-shot and aspect-grounded prompting) and evaluated LLM performance on narrative similarity tasks under controlled variations, alongside a hybrid system combining embedding similarity and LLM-based reasoning"

    contribution: "Conducted a structured evaluation of prompt sensitivity in LLM reasoning within a competitive benchmark setting, achieving 3rd rank out of 47 international systems"

    insight: "Observed significant variability in model outputs due to small prompt changes, highlighting instability in reasoning and the need for more robust evaluation and control mechanisms"

    links: []


  - title: "Knowledge Graph Construction from Unstructured Text using LLMs"
    focus: "Knowledge grounding and structured representations"

    description: "Building knowledge graphs from unstructured documents to support structured retrieval and exploration"

    problem: "LLMs operating on unstructured text lack explicit structure, limiting interpretability and traceability in downstream applications"

    approach: "Developed an LLM-based pipeline for entity recognition and relationship extraction, followed by graph construction and visualization with direct linkage to source documents"

    contribution: "Implemented a system for transforming unstructured documents into navigable knowledge graphs with document-linked exploration features"

    insight: "Structured representations improve interpretability and retrieval, but do not fully address inconsistencies in LLM reasoning, indicating the need for tighter integration between knowledge and inference"

    links: []


  - title: "HistoAI: Knowledge-Grounded RAG System for Historical Documents"
    focus: "Applied AI systems and reliability in real-world LLM pipelines"

    description: "Developing an end-to-end system integrating OCR, knowledge graphs, and retrieval-augmented generation for historical document understanding"

    problem: "LLM-based systems face reliability challenges in real-world document tasks due to noisy data, degraded text, fragmented context, and lack of structured grounding"

    approach: "Built an end-to-end pipeline combining OCR-based extraction (with preprocessing for degraded documents), knowledge graph generation, and retrieval-augmented generation (RAG) to enable context-aware querying over historical archives"

    contribution: "Developed a production-oriented system integrating OCR, structured knowledge, and retrieval pipelines, highlighting practical challenges in deploying knowledge-grounded LLM systems on noisy real-world data"

    insight: "Both upstream data quality (OCR and preprocessing) and downstream components (retrieval and knowledge representation) significantly influence LLM output reliability, emphasizing the importance of end-to-end system design"

    links: []
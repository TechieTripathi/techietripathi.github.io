projects:

  - title: "LLM Prompt Sensitivity & Narrative Reasoning Analysis"
    focus: "LLM reasoning robustness and evaluation"

    description: Studied the stability of LLM reasoning under controlled prompt variations as part of SemEval 2026 Task 4

    problem: "Minor prompt variations often lead to inconsistent LLM reasoning and unreliable outputs"

    approach: "Designed structured prompt families (few-shot and aspect-grounded prompts) and evaluated narrative similarity using hybrid embedding + LLM reasoning pipelines"

    contribution: "Ranked 3rd out of 47 international teams in SemEval 2026 Task 4 through systematic prompt sensitivity evaluation"

    insight: "Small contextual changes significantly altered model predictions, exposing instability in reasoning behavior"

    links: []


  - title: "Knowledge Graph Construction from Unstructured Text using LLMs"

    focus: "Knowledge grounding and structured representations"

    description: "Building knowledge graphs from unstructured documents to support structured retrieval and exploration"

    problem: "LLMs operating on unstructured text lack explicit structure, limiting interpretability and traceability in downstream applications"

    approach: "Developed a pipeline for entity and relation extraction using LLM-assisted parsing, followed by structured graph construction with direct linkage to source documents"

    contribution: "Designed and evaluated a document-to-graph transformation pipeline enabling structured exploration of unstructured corpora"

    insight: "Structured representations improve interpretability and retrieval, but do not fully resolve inconsistencies in LLM reasoning, indicating the need for tighter integration between knowledge and inference"

    links: []


  - title: "HistoAI: Knowledge-Grounded RAG System for Historical Documents"

    focus: "Applied AI systems and reliability in real-world LLM pipelines"

    description: "Developing an end-to-end system integrating OCR, knowledge graphs, and retrieval-augmented generation for historical document understanding"

    problem: "LLM-based systems face reliability challenges in document understanding tasks due to noisy OCR outputs, degraded text, fragmented context, and limited structured grounding"

    approach: "Built an end-to-end pipeline combining OCR preprocessing for degraded documents, knowledge graph construction, and retrieval-augmented querying to enable context-aware exploration of historical archives"

    contribution: "Developed an integrated document intelligence pipeline combining OCR, structured retrieval, and knowledge-guided querying for noisy historical records"

    insight: "Both upstream OCR quality and downstream retrieval components significantly influence LLM reasoning reliability, emphasizing the importance of end-to-end system design"

    links: []